<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RIDE DASH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap');

  :root {
    --bg: #0a0c0f;
    --panel: #0f1318;
    --border: #1e2830;
    --accent: #00d4ff;
    --accent2: #ff6b00;
    --warn: #ffcc00;
    --text: #c8d8e8;
    --dim: #4a6070;
    --glow: 0 0 12px rgba(0,212,255,0.4);
    --glow2: 0 0 12px rgba(255,107,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 12px 10px;
    gap: 10px;
    min-height: 100dvh;
  }

  /* ヘッダー */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }
  .brand {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-shadow: var(--glow);
  }
  .status-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active {
    background: #00ff88;
    box-shadow: 0 0 8px rgba(0,255,136,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.5; }
  }
  .status-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }
  .status-label.active { color: #00ff88; }

  /* 速度メインパネル */
  .speed-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 16px 16px;
    position: relative;
    overflow: hidden;
    flex: 0 0 auto;
  }
  .speed-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .speed-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .speed-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 6rem;
    font-weight: 700;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,212,255,0.3);
    letter-spacing: -0.02em;
  }
  .speed-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: var(--dim);
    letter-spacing: 0.2em;
    margin-top: -4px;
  }
  /* スピードバー */
  .speed-bar-wrap {
    margin-top: 12px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .speed-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
    box-shadow: var(--glow);
  }

  /* サブパネルグリッド */
  .sub-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex: 0 0 auto;
  }

  .sub-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 14px 12px;
    position: relative;
    overflow: hidden;
  }
  .sub-panel::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .sub-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-bottom: 6px;
  }
  .sub-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1;
    color: #fff;
  }
  .sub-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    margin-top: 2px;
    letter-spacing: 0.15em;
  }

  /* 高度パネルアクセント */
  .alt-panel .sub-panel-accent {
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    background: radial-gradient(circle at top right, rgba(255,107,0,0.08), transparent 70%);
  }
  .alt-panel .sub-value { color: var(--accent2); text-shadow: var(--glow2); }

  /* 方位コンパス */
  .compass-panel .sub-value {
    font-size: 1.8rem;
    color: var(--warn);
    text-shadow: 0 0 12px rgba(255,204,0,0.4);
    margin-bottom: 2px;
  }
  .compass-deg {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--dim);
  }
  .compass-needle {
    margin-top: 6px;
    width: 28px; height: 28px;
    position: relative;
  }
  .compass-needle svg {
    width: 100%; height: 100%;
    transition: transform 0.4s ease;
  }

  /* 現在地パネル */
  .location-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 80px;
    position: relative;
    overflow: hidden;
  }
  .location-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
  }
  .loc-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-bottom: 8px;
  }
  .loc-value {
    font-size: 1.35rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.35;
    word-break: break-all;
  }
  .loc-loading {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    animation: blink 1.2s infinite;
  }
  @keyframes blink {
    0%,100%{opacity:1} 50%{opacity:0.2}
  }

  /* エラー表示 */
  .error-msg {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: #ff4466;
    text-align: center;
    padding: 4px 0;
    display: none;
  }

  /* 時刻フッター */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    flex: 0 0 auto;
  }
  .clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    color: var(--dim);
    letter-spacing: 0.15em;
  }
  .acc-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div class="header">
  <div class="brand">RIDE DASH</div>
  <div class="status-row">
    <div class="status-dot" id="gpsDot"></div>
    <div class="status-label" id="gpsLabel">GPS...</div>
  </div>
</div>

<div class="speed-panel">
  <div class="speed-label">SPEED</div>
  <div class="speed-value" id="speedVal">--</div>
  <div class="speed-unit">km/h</div>
  <div class="speed-bar-wrap">
    <div class="speed-bar" id="speedBar"></div>
  </div>
</div>

<div class="sub-grid">
  <div class="sub-panel alt-panel">
    <div class="sub-panel-accent"></div>
    <div class="sub-label">ALTITUDE</div>
    <div class="sub-value" id="altVal">--</div>
    <div class="sub-unit">meters</div>
  </div>
  <div class="sub-panel compass-panel">
    <div class="sub-label">HEADING</div>
    <div class="sub-value" id="headingDir">--</div>
    <div class="compass-deg" id="headingDeg">---°</div>
    <div class="compass-needle">
      <svg id="needleSvg" viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="13" fill="none" stroke="#1e2830" stroke-width="1.5"/>
        <polygon points="14,3 17,14 14,12 11,14" fill="#ff4444"/>
        <polygon points="14,25 17,14 14,16 11,14" fill="#4a6070"/>
        <circle cx="14" cy="14" r="2" fill="#fff"/>
      </svg>
    </div>
  </div>
</div>

<div class="location-panel">
  <div class="loc-label">LOCATION</div>
  <div class="loc-value" id="locVal">
    <span class="loc-loading">取得中...</span>
  </div>
</div>

<div class="error-msg" id="errMsg"></div>

<div class="footer">
  <div class="clock" id="clock">--:--:--</div>
  <div class="acc-label" id="accLabel"></div>
</div>

<script>
// ===== 時刻 =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ===== 方位変換 =====
function degToCompass(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// ===== リバースジオコーディング =====
let lastGeocode = 0;
let lastLat = null, lastLon = null;

async function reverseGeocode(lat, lon) {
  // 前回から50m以上動いていないかつ30秒以内なら再取得しない（簡易間引き）
  const now = Date.now();
  if (now - lastGeocode < 15000) return;
  lastGeocode = now;
  lastLat = lat; lastLon = lon;

  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja&zoom=13`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'ja' } });
    const data = await res.json();
    const addr = data.address || {};

    // 市区町村レベルまで（番地・丁目は除外）
    const parts = [];
    if (addr.country_code === 'jp') {
      if (addr.state)        parts.push(addr.state);
      if (addr.county)       parts.push(addr.county);
      if (addr.city)         parts.push(addr.city);
      else if (addr.town)    parts.push(addr.town);
      else if (addr.village) parts.push(addr.village);
      if (addr.suburb || addr.neighbourhood) {
        parts.push(addr.suburb || addr.neighbourhood);
      }
    } else {
      // 海外フォールバック
      if (addr.state) parts.push(addr.state);
      if (addr.city || addr.town || addr.village) parts.push(addr.city || addr.town || addr.village);
    }

    const locEl = document.getElementById('locVal');
    if (parts.length > 0) {
      locEl.innerHTML = parts.join('<br>');
    } else {
      locEl.textContent = data.display_name?.split(',').slice(0,3).join(' ') || '取得できませんでした';
    }
  } catch(e) {
    // ネットワークエラー時は座標を表示
    document.getElementById('locVal').textContent = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  }
}

// ===== GPS =====
const gpsDot   = document.getElementById('gpsDot');
const gpsLabel = document.getElementById('gpsLabel');
const errMsg   = document.getElementById('errMsg');

function showError(msg) {
  errMsg.style.display = 'block';
  errMsg.textContent = msg;
}

if (!navigator.geolocation) {
  showError('このブラウザはGeolocationに対応していません');
} else {
  navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude, longitude, altitude, speed, heading, accuracy } = pos.coords;

      // GPS状態
      gpsDot.classList.add('active');
      gpsLabel.classList.add('active');
      gpsLabel.textContent = 'GPS ON';
      errMsg.style.display = 'none';

      // 速度 (m/s → km/h)
      const speedKmh = speed != null ? Math.round(speed * 3.6) : 0;
      document.getElementById('speedVal').textContent = speedKmh;
      // バー（最大160km/hを100%）
      const barPct = Math.min(speedKmh / 160 * 100, 100);
      document.getElementById('speedBar').style.width = barPct + '%';

      // 高度
      document.getElementById('altVal').textContent =
        altitude != null ? Math.round(altitude) : '--';

      // 方位
      if (heading != null && !isNaN(heading)) {
        document.getElementById('headingDir').textContent = degToCompass(heading);
        document.getElementById('headingDeg').textContent = Math.round(heading) + '°';
        document.getElementById('needleSvg').style.transform = `rotate(${heading}deg)`;
      }

      // 精度表示
      document.getElementById('accLabel').textContent = accuracy ? `±${Math.round(accuracy)}m` : '';

      // 住所（間引き取得）
      reverseGeocode(latitude, longitude);
    },
    (err) => {
      gpsDot.classList.remove('active');
      gpsLabel.classList.remove('active');
      gpsLabel.textContent = 'GPS ERR';
      const msgs = {
        1: '位置情報の許可が必要です',
        2: '位置情報を取得できません',
        3: '位置情報の取得がタイムアウトしました'
      };
      showError(msgs[err.code] || '位置情報エラー');
      document.getElementById('locVal').innerHTML = '<span class="loc-loading">許可待ち...</span>';
    },
    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 2000
    }
  );
}

// ===== デバイスコンパス（スマホ）=====
// iOSは許可が必要
function startCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS13+
    document.addEventListener('click', async () => {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') listenOrientation();
      } catch(e) {}
    }, { once: true });
  } else if (window.DeviceOrientationEvent) {
    listenOrientation();
  }
}

function listenOrientation() {
  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation', handleOrientation, true);
}

function handleOrientation(e) {
  // GPSのheadingが使えている場合はスキップ
  let deg = null;
  if (e.absolute && e.alpha != null) {
    deg = 360 - e.alpha; // deviceorientationabsolute
  } else if (e.webkitCompassHeading != null) {
    deg = e.webkitCompassHeading; // Safari
  }
  if (deg == null) return;
  deg = (deg + 360) % 360;

  document.getElementById('headingDir').textContent = degToCompass(deg);
  document.getElementById('headingDeg').textContent = Math.round(deg) + '°';
  document.getElementById('needleSvg').style.transform = `rotate(${deg}deg)`;
}

startCompass();
</script>
</body>
</html>
